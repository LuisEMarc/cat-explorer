<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" type="image/x-icon" href="assets/images/icon-cat.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Cat Explorer</title>

</head>

<body>

    <main class="container">

        <section class="hero-card">

            <div class="hero-header">

                <h1>🐱 Cat Explorer</h1>

                <div class="theme-toggle">

                    <i id="themeIcon" class="bi bi-moon-fill"></i>

                    <label class="switch">
                        <input type="checkbox" id="themeSwitch">
                        <span class="slider"></span>
                    </label>

                </div>

            </div>

            <p>
                Discover cat breeds from around the world
            </p>

        </section>

        <section id="catsGrid" class="cards-grid">

        </section>

    </main>

    <footer class="hero-card footer-card">

        <h2>🐱 Cat Explorer</h2>

        <p>
            Powered by The Cat API • Built by LuisEMarc
        </p>

    </footer>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/main.js"></script>

</body>

</html>
