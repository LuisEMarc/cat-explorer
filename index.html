        <section class="hero-card">

        </section>

    <footer class="hero-card footer-card">

        <h2>🐱 Cat Explorer</h2>

            Powered by The Cat API • Built by LuisEMarc
        </p>

    </footer>

    <script src="assets/js/api.js"></script>
