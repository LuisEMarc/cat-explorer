<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="icon" type="image/x-icon" href="assets/images/icon-cat.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <title>Cat Explorer</title>

</head>

<body>

    <main class="container">

        <section class="hero-card">

            <div class="hero-header">

                <h1>🐱 Cat Explorer</h1>

                <div class="theme-toggle">

                    <i id="themeIcon" class="bi bi-moon-fill"></i>

                    <label class="switch">
                        <input type="checkbox" id="themeSwitch">
                        <span class="slider"></span>
                    </label>

                </div>

            </div>

            <p>
                Discover cat breeds from around the world
            </p>

        </section>

        <section id="catsGrid" class="cards-grid">

        </section>

    </main>

    <footer class="hero-card footer-card">

        <h2>🐱 Cat Explorer</h2>

        <p>
            Powered by The Cat API • Built by LuisEMarc
        </p>

    </footer>

    <div class="modal fade" id="catModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered cat-modal-dialog">
            <div class="modal-content cat-modal">
                <img id="modalImage" class="cat-modal-image" src="" alt="">
                <div class="cat-modal-body">

                    <h2 id="modalName"></h2>

                    <div id="modalOrigin" class="cat-origin"></div>
                    <div id="modalTemperament" class="cat-temperament"></div>
                    <div id="modalDescription" class="cat-description"></div>

                    <hr>

                    <div id="modalStats"></div>
                    <a id="modalWiki" target="_blank" class="wiki-button">
                        Learn more
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/main.js"></script>

</body>

</html>
